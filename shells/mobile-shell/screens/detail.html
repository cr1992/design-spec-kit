<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit · 详情</title>
<script>(function(){var p=new URLSearchParams(location.search),r=document.documentElement;r.setAttribute("data-theme",p.get("theme")||"purple");r.setAttribute("data-mode",p.get("mode")||"light");r.setAttribute("data-state",p.get("state")||"default");})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/spec.css">
<link rel="stylesheet" href="../assets/screen.css">
<style>
  .detail-body { padding: var(--sp-5) var(--sp-5) 0; }
  .detail-body .kicker { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-ink); font-weight: 600; }
  .detail-body h1 { font-family: var(--font-serif); font-weight: 600; font-size: 27px; line-height: 1.3; color: var(--ink); margin: var(--sp-2) 0 var(--sp-4); letter-spacing: -0.01em; }
  .detail-body p { font-family: var(--font-serif); font-size: 16px; line-height: 1.8; color: var(--ink); margin: 0 0 var(--sp-4); text-wrap: pretty; }
  .detail-body p.muted { color: var(--ink-2); }
</style>
</head>
<body>
<div class="pg">
  <div class="app-top">
    <button class="ico" data-nav-back aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5-7 7 7 7"/></svg>
    </button>
    <div class="title">详情</div>
    <div class="acts"><button class="ico" data-demo-sheet aria-label="更多"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg></button></div>
  </div>

  <div class="app-scroll">
    <div class="detail-body">
      <div class="kicker">Detail</div>
      <h1>这是一个详情页示例</h1>
      <p>正文用衬线字体（Newsreader + Noto Serif SC），UI 用无衬线。换 <code>tokens.css</code> 即可整体换肤，三套主题色 × 明暗都自动适配。</p>
      <p class="muted">左上角返回会触发 <code>data-nav-back</code> → 父级路由 pop；在画布模式里这次返回被忽略（画布只看，不路由）。</p>
    </div>
  </div>
</div>
<script src="../assets/screen.js"></script>
<script src="../assets/sheet.js"></script>
<script>
  /* 示例：点 ⋯ 唤起底部弹层（动作菜单）。业务里把这类逻辑集中到 screen.js 或各屏。 */
  document.addEventListener("click", function (e) {
    if (!e.target.closest("[data-demo-sheet]")) return;
    if (!window.DZ || !DZ.sheet) return;
    var ed = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
    var tr = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>';
    DZ.sheet({ title: "更多", items: [
      { label: "编辑", icon: ed },
      { sep: true },
      { label: "删除", icon: tr, tone: "danger" }
    ] });
  });
</script>
</body>
</html>
