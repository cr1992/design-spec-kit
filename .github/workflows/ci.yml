name: design-spec-kit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run kit CI checks
        run: node tools/ci-check.js
