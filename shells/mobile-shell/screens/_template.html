<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit · 新屏模板</title>
<!-- 首屏脚本：把 URL 参数(?theme/?mode/?state)写到 <html> 上，供 screen.css/js 读取。照抄，勿删。 -->
<script>(function(){var p=new URLSearchParams(location.search),r=document.documentElement;r.setAttribute("data-theme",p.get("theme")||"purple");r.setAttribute("data-mode",p.get("mode")||"light");r.setAttribute("data-state",p.get("state")||"default");})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/spec.css">
<link rel="stylesheet" href="../assets/screen.css">
<!-- 屏内专属样式可写这里的 <style>；通用组件放 spec.css -->
</head>
<body>
<!--
  契约：
  - 根 .pg；固定头用 .app-top（标题 .title / 左侧 .ico 返回 / 右侧 .acts）。
  - 滚动区 .app-scroll；iOS chrome（灵动岛/状态栏/Home 条）由 screen.js 注入，勿自绘。
  - 设备：外壳传 ?device=phone|pad，screen.js 写到 <html data-device>；iPad 横屏只有状态栏（无灵动岛）。
    需要 master-detail 的屏：phone 单列 push；pad 用 .lay-pad 左列表+右详情，并在 app.js 的 deviceAlias 把子屏别名到本屏。
  - 多状态：给块加 data-when="xxx"，?state=xxx 命中才显示；并在外壳 app.js 的 SCREENS[].states 登记。
  - 跳转：元素加 data-nav="<目标屏id>"（前进）或 data-nav-back（返回）；screen.js 转成 postMessage，外壳路由。
    带条目：data-nav 元素加 data-rid="<条目id>"（或屏内 postMessage({type:'nav',to,rid})），透传给目标详情屏。
  - 换条目零重载：详情屏常驻缓存、不按 rid 重载；监听 {type:'select',rid} 就地换数据（见下方示例脚本）。
  - 可选：.drawer-stage + .scrim + .drawer（抽屉）、.fab-wrap（FAB）。
-->
<div class="pg">
  <div class="app-top">
    <button class="ico" data-nav-back aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5-7 7 7 7"/></svg>
    </button>
    <div class="title">新屏标题</div>
    <div class="acts"></div>
  </div>

  <div class="app-scroll">
    <div data-when="default">
      <!-- 默认态内容 -->
    </div>
    <!-- 其他状态：
    <div data-when="empty">空状态…</div>
    -->
  </div>
</div>
<script src="../assets/screen.js"></script>
<!-- 详情类屏：换条目零重载（外壳发 select，屏内就地换数据，秒切无白屏）。按需取消注释：
<script>
(function(){
  var DATA = window.YOUR_DATA || [];            // 本屏数据源
  function getById(id){ return DATA.filter(function(x){return x.id===id;})[0]; }
  function renderItem(item){ /* 把 item 渲染进 .app-scroll；切换时可 scrollTop=0 */ }
  // 初始：从 ?rid= 定位
  var rid = new URLSearchParams(location.search).get("rid");
  renderItem(getById(rid) || DATA[0]);
  // 父级就地换条目（不重载 iframe）
  window.addEventListener("message", function(e){
    var d = e.data||{};
    if (d.type === "select" && d.rid){ var it = getById(d.rid); if (it) renderItem(it); }
  });
})();
</script>
-->
</body>
</html>
