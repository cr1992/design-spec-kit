<!DOCTYPE html>
<html lang="zh-CN" data-theme="purple" data-mode="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype Kit · 原型框架</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/spec.css">
<link rel="stylesheet" href="assets/pages.css">
</head>
<body>

<!-- ============ 顶部控制栏 ============ -->
<header class="topbar">
  <div class="brand">
    <div class="mark">P</div>
    <div><b>Prototype Kit</b> <span class="sub">原型框架</span></div>
  </div>

  <div class="seg view" id="viewSeg" role="group" aria-label="视图">
    <button data-view="interactive" aria-selected="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11.5V5a2 2 0 0 1 4 0v6.5"/><path d="M13 9a2 2 0 0 1 4 0v3"/><path d="M17 10a2 2 0 0 1 4 0v4a7 7 0 0 1-7 7h-1.5a6 6 0 0 1-4.5-2L4 16a1.5 1.5 0 0 1 2.5-2l1.5 1.5"/></svg>交互</button>
    <button data-view="reference"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>参考</button>
  </div>

  <div class="spacer"></div>
  <span class="hint">交互可点进点出 · 参考拖拽缩放速览</span>

  <div class="seg" id="devSeg" role="group" aria-label="设备">
    <button data-dev="both" aria-selected="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="9" height="16" rx="2"/><rect x="13" y="7" width="9" height="13" rx="2"/></svg>双端</button>
    <button data-dev="phone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>iPhone</button>
    <button data-dev="pad"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M19 11h.01"/></svg>iPad</button>
  </div>
  <div class="switcher" id="switcher" role="group" aria-label="主题色"></div>
  <button class="mode-toggle" id="modeToggle" title="切换明暗">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <span class="lbl">浅色</span>
  </button>
</header>

<!-- ============ 工作台 ============ -->
<div class="viewer" id="viewer">
  <aside class="rail" id="rail"></aside>
  <div class="stage" id="stage"></div>
  <div class="zoomctl" id="zoomctl">
    <button data-z="out" title="缩小"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
    <span class="pct" data-z="reset" title="重置 100%">100%</span>
    <button data-z="in" title="放大"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>
</div>

<!-- ============================================================
     ★ 唯一业务耦合点：复用时只改这块 PROTO_CONFIG，并写 screens/*.html
        screens   每屏 {id,idx,name,group,states:[{k,n}]}
        deviceAlias  pad 上 master-detail：{ 子屏id:'父屏id' }（详情就地活在父屏右栏）
        换条目零重载：列表项点击 postMessage({type:'nav',to:'详情屏',rid:'条目id'})，
                     详情屏内监听 {type:'select',rid} 就地换数据（见 _template.html）
     ============================================================ -->
<script>
window.PROTO_CONFIG = {
  screensDir: "screens/",
  storagePrefix: "protokit",
  devices: {
    phone: { w: 418, h: 872, label: "iPhone · 移动端" },
    pad:   { w: 1212, h: 852, label: "iPad · Pad 端" }
  },
  defaultDevice: "both",            // both | phone | pad
  defaultTheme: "purple",
  defaultMode: "light",
  refScale: 0.4,
  themes: [
    { id: "purple", name: "雾紫 Lavender", color: "#8B7CF0" },
    { id: "amber",  name: "暖黄 Honey",    color: "#D9A441" },
    { id: "sage",   name: "雾绿 Sage",     color: "#6FA382" }
  ],
  /* pad master-detail 别名：子屏在 pad 上就地活在父屏右栏，不单独成屏。
     例：{ "detail": "home" }。示例屏未做 pad 分栏，留空。 */
  deviceAlias: {},
  screens: [
    { id: "home",   idx: "01", name: "首页", group: "示例", states: [{ k: "default", n: "默认" }, { k: "empty", n: "空状态" }] },
    { id: "detail", idx: "02", name: "详情", group: "示例", states: [{ k: "default", n: "默认" }] }
  ]
};
</script>
<script src="assets/app.js"></script>
</body>
</html>
